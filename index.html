<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Writing — Prakhar Gautam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbf9f4;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --accent: #8a2c2c;
    --rule: #d8d3c7;
    --max-width: 1180px;
    --content-width: 720px;
  }

  * { box-sizing: border-box; }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
  }

  .site-header {
    border-bottom: 1px solid var(--rule);
    padding: 22px 0 18px;
    margin-bottom: 36px;
  }
  .site-header-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: baseline;
    gap: 28px;
    font-size: 17px;
  }
  .site-header a {
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .site-header a:hover { color: var(--accent); }
  .site-header .nav-spacer { flex: 1; }
  .site-header .nav-active { color: var(--accent); }

  .page {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 32px 120px;
  }

  .content { max-width: var(--content-width); }

  h1.section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 32px;
  }

  .article-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .article-item {
    display: flex;
    align-items: baseline;
    gap: 24px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }

  .article-item:first-child { border-top: 1px solid var(--rule); }

  .article-date {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 80px;
    font-style: italic;
  }

  .article-body { flex: 1; }

  .article-title {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin: 0 0 5px;
  }

  .article-title a {
    color: var(--text);
    text-decoration: none;
    border-bottom: none;
    transition: color 0.15s;
  }
  .article-title a:hover { color: var(--accent); }

  .article-tag {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  @media (max-width: 720px) {
    body { font-size: 17px; }
    .page, .site-header-inner { padding: 0 20px; }
    .site-header-inner { gap: 18px; flex-wrap: wrap; }
    .article-item { flex-direction: column; gap: 4px; }
    .article-date { min-width: unset; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="index.html" class="nav-active">Writing</a>
    <a href="https://www.linkedin.com/in/prakhargautam/" target="_blank">LinkedIn</a>
    <a href="https://github.com/prakhag2" target="_blank">GitHub</a>
    <span class="nav-spacer"></span>
  </div>
</header>

<main class="page">
  <div class="content">
    <h1 class="section-title">Writing</h1>
    <ul class="article-list">

      <li class="article-item">
        <span class="article-date">May 2026</span>
        <div class="article-body">
          <div class="article-title">
            <a href="writing/finding-vulnerabilities-with-agents.html">AI security review: very fast, very confident, often wrong.</a>
          </div>
          <span class="article-tag">Security &middot; AI Agents</span>
        </div>
      </li>

      <li class="article-item">
        <span class="article-date">May 2026</span>
        <div class="article-body">
          <div class="article-title">
            <a href="writing/shaping-agent-behavior.html">Shaping Agent Behavior Through Trajectory Optimization</a>
          </div>
          <span class="article-tag">AI Agents</span>
        </div>
      </li>

    </ul>
  </div>
</main>

</body>
</html>
